<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self' data: https:;">
  <title>CinePremium Edit</title>
  <link rel="stylesheet" href="/styles.css">
  <!-- Pré-conecta ao próprio servidor para acelerar fetch dos produtos -->
  <link rel="preconnect" href="/">
</head>

<body>
  <div class="container" id="mainContainer">
    <div id="cabeçalho">
      <img src="/CInePremium1.png" alt="Imagem de Cabeçalho" width="100%">
    </div>
    <div id="cabeçalhoredondo">
      <img src="/cinepremiumredondo.png" alt="Logo CinePremium" width="100" height="100">
    </div>
    <div id="productGrid" class="product-grid">
      <!-- Skeletons de carregamento visual -->
      <div class="product-card skeleton-card"></div>
      <div class="product-card skeleton-card"></div>
      <div class="product-card skeleton-card"></div>
      <div class="product-card skeleton-card"></div>
    </div>
    <div id="purchaseContainer" class="purchase-container">
      <h1>Detalhes da Compra</h1>
      <h2>
        <p id="productInfo"></p>
      </h2>
      <input type="text" id="nome" placeholder="Digite seu nome completo">
      <input type="tel" id="telefone" placeholder="Digite seu telefone (DDD + número)">
      <input type="text" id="cpf" placeholder="Digite seu CPF (apenas números)">
      <input type="email" id="email" placeholder="Digite seu e-mail">
      <br>
      <button id="generateBtn" class="button" disabled>Gerar QR Code</button>
      <div id="loadingSpinner" class="loading-spinner"></div>
      <div id="qrDisplay" class="qr-section" style="display: none;">
        <h3 style="color: #fff; margin-bottom: 20px;">Pagamento via QR Code</h3>
        <div class="qr-code-container" style="text-align: center; margin-bottom: 20px;">
          <div id="qrCodeImg"></div>
        </div>
        <div class="pix-code-display" style="margin: 20px 0;">
          <p id="qrCodeText" class="pix-code-text"></p>
        </div>
        <p id="transactionId" class="copy-info" style="margin: 15px 0; text-align: center;"></p>
        <div style="text-align: center; margin: 20px 0;">
          <button id="copyBtn" class="button">Copiar Código</button>
        </div>
        <p id="paymentStatus" class="status-feedback" style="text-align: center;"></p>
      </div>
      <button id="backBtn" class="button" style="margin-top:15px;">Voltar aos Produtos</button>
    </div>
    <footer class="footer">
      <span>&copy; 2025 - Todos os direitos reservados</span>
      <span class="email-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M0 0h24v24H0z" fill="none" />
          <path
            d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
        </svg>
      </span>
      <span>cinepremium.sac@gmail.com</span>
    </footer>
  </div>
  <script src="/app.js" defer></script>
</body>

</html>
